app = 'pollz-backend'
primary_region = 'iad'

[build]

[env]
  FRONTEND_ORIGIN = 'https://pollz.waow.tech'
  OAUTH_CLIENT_ID = 'https://api.pollz.waow.tech/oauth-client-metadata.json'
  OAUTH_REDIRECT_URI = 'https://api.pollz.waow.tech/oauth/callback'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1

[mounts]
  source = 'pollz_data'
  destination = '/data'
